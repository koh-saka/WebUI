<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>MPS Local</title>

    <link rel="stylesheet" href="./css/mps.css">
</head>
<body>

<div id="mps_root" class="debug-box debug-root" data-name="mps_root">
    <div id="mps_header" class="debug-box debug-label debug-header" data-name="mps_header"></div>

    <div id="mps_main" class="debug-box debug-main" data-name="mps_main">
        <div id="mps_view" class="debug-box debug-view" data-name="mps_view">
            <div id="mps_view_top" class=" debug-box debug-live" data-name="mps_view_top">

                <div class="mps_live_view_container debug-box debug-live" data-name="mps_live_view_container">
                    <div class="mps_live_view_header debug-box debug-live" data-name="mps_live_view_header"></div>
                    <div class="mps_live_view_body debug-box debug-live" data-name="mps_live_view_body"></div>
                    <div class="mps_live_view_split debug-box debug-live" data-name="mps_live_view_split"></div>
                    <div class="mps_live_view_side_controls debug-box debug-labrl debug-live" data-name="mps_live_view_side_controls"></div>
                </div>

            </div>
            <div id="mps_view_bottom" class="debug-box debug-preset" data-name="mps_view_bottom">

                <div class="mps_preset_container debug-box debug-preset" data-name="mps_preset_container">
                    <div class="mps_preset_toolbar debug-box debug-label debug-preset" data-name="mps_preset_toolbar"></div>

                    <div class="mps_preset_body debug-box debug-label debug-preset" data-name="mps_preset_body">
                        <div class="mps_preset_list_container debug-box debug-preset" data-name="mps_preset_list_container"></div>
                        <div class="mps_preset_center_line debug-box debug-preset" data-name="mps_preset_center_line"></div>
                        <div class="mps_target_frame_container debug-box debug-preset" data-name="mps_target_frame_container"></div>
                    </div>
                </div>

            </div>
        </div>

        <div id="mps_panel" class="debug-box debug-panel" data-name="mps_panel">
            <div id="mps_panel_header" class="debug-box debug-label debug-panel" data-name="mps_panel_header"></div>

            <div id="mps_panel_body" class="debug-box debug-panel" data-name="mps_panel_body">

                <div class="mps_manual_control_container debug-box debug-panel" data-name="mps_manual_control_container">

                    <div class="mps_manual_frame_adjust_tabs debug-box debug-panel" data-name="mps_manual_frame_adjust_tabs">
                        <div class="mps_manual_tab mps_is_active">Manual</div>
                        <div class="mps_manual_tab mps_is_disabled">Frame Adjust</div>
                    </div>

                    <div class="mps_manual_control_line_1">
                        <div class="mps_manual_control_line_2"></div>
                        <div class="mps_manual_control_line_4"></div>
                        <div class="mps_manual_control_line_5"></div>
                    </div>

                    <div class="mps_manual_control_main debug-box debug-panel" data-name="mps_manual_control_main">

                        <div class="mps_manual_ptz_column debug-box debug-panel" data-name="mps_manual_ptz_column">
                            <div class="mps_camera_ptz_ctrl" style="display: none;">
                                <canvas class="mps_control_ptz" width="212" height="212"></canvas>
                            </div>

                            <div class="mps_manual_control debug-box debug-panel" data-name="mps_manual_control">
                                <div class="mps_manual_ctrl_center"></div>
                                <div class="mps_manual_control_up"></div>
                                <div class="mps_manual_control_top_right"></div>
                                <div class="mps_manual_control_right"></div>
                                <div class="mps_manual_control_bottom_right"></div>
                                <div class="mps_manual_control_down"></div>
                                <div class="mps_manual_control_bottom_left"></div>
                                <div class="mps_manual_control_left"></div>
                                <div class="mps_manual_control_top_left"></div>
                            </div>

                            <div class="mps_lock_part debug-box debug-panel" data-name="mps_lock_part">
                                <div class="mps_ptz_lock">
                                    <div class="mps_ptz_lock_btn"></div>
                                </div>
                            </div>
                        </div>

                        <div class="mps_view_content mps_speed_slider debug-box debug-panel" data-name="mps_speed_slider">
                            <div class="mps_slider_view_content">
                                <div class="mps_slider_title">Speed</div>
                                <div class="mps_slider_btn mps_slider_btn_top">Fast</div>
                                <div class="mps_slider_vertical_container">
                                    <div class="mps_slider_top"></div>
                                    <div class="mps_slider_handle"></div>
                                    <div class="mps_slider_bottom mps_slider_bottom_speed"></div>
                                </div>
                                <div class="mps_slider_btn mps_slider_btn_bottom">Slow</div>
                            </div>
                        </div>

                        <div class="mps_view_content mps_zoom_slider debug-box debug-panel" data-name="mps_zoom_slider">
                            <div class="mps_slider_view_content">
                                <div class="mps_slider_title">Zoom</div>
                                <div class="mps_slider_btn mps_slider_btn_top">Tele</div>
                                <div class="mps_slider_vertical_container">
                                    <div class="mps_slider_top"></div>
                                    <div class="mps_slider_handle"></div>
                                    <div class="mps_slider_bottom mps_slider_bottom_zoom"></div>
                                </div>
                                <div class="mps_slider_btn mps_slider_btn_bottom">Wide</div>
                            </div>
                            <div class="mps_auto_btn mps_is_disabled">Auto</div>
                        </div>

                        <div class="mps_view_content mps_focus_slider debug-box debug-panel" data-name="mps_focus_slider">
                            <div class="mps_slider_view_content">
                                <div class="mps_slider_title">Focus</div>
                                <div class="mps_slider_btn mps_slider_btn_top mps_is_disabled">Far</div>
                                <div class="mps_slider_vertical_container mps_is_disabled">
                                    <div class="mps_slider_top"></div>
                                    <div class="mps_slider_handle"></div>
                                    <div class="mps_slider_bottom mps_slider_bottom_focus"></div>
                                </div>
                                <div class="mps_slider_btn mps_slider_btn_bottom mps_is_disabled">Near</div>
                            </div>
                            <div class="mps_auto_btn mps_focus_auto">Auto</div>
                        </div>

                    </div>
                </div>

                <div class="mps_limitation_container debug-box debug-label debug-panel" data-name="mps_limitation_container"></div>
                <div class="mps_track_adjust_tabs_container debug-box debug-label debug-panel" data-name="mps_track_adjust_tabs_container"></div>
                <div class="mps_track_adjust_content_container debug-box debug-label debug-panel" data-name="mps_track_adjust_content_container">
                    <div class="mps_auto_framing_container debug-box debug-panel"
                        data-name="mps_auto_framing_container"></div>
                    <div class="mps_image_adjust_container debug-box debug-panel"
                        data-name="mps_image_adjust_container"></div>
                </div>
                
            </div>
        </div>
    </div>
</div>

<!-- 既存環境の共通JS -->
<script src="/js/include/capi.js"></script>
<script src="/js/include/jquery-3.5.1.min.js"></script>
<script src="/js/include/jquery-ui.js"></script>
<script src="/js/include/jquery.ui.touch-punch.js"></script>
<script src="/js/include/jquery.alerts.live.js"></script>
<script src="/js/include/jquery.form.js"></script>
<script src="/js/include/cparam.js"></script>

<script src="/js/pc/common_function.js"></script>

<!-- MPS初期化 -->
<script src="./js/mps_init.js"></script>

</body>
</html>
